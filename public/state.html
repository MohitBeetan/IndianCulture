<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>State Details</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link
    href="https://fonts.googleapis.com/css2?family=Yatra+One&family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Cinzel:wght@400;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --saffron: #e8621a;
      --maroon: #6b0f1a;
      --maroon-deep: #3d0007;
      --gold: #c9962a;
      --gold-light: #f0c040;
      --ivory: #fbf5e6;
      --cream: #f5e6c8;
      --charcoal: #1a0a00;
      --text-dark: #2c1810;
      --text-mid: #5c3d2e;
      --text-light: #8b6e5a;
      --white: #fffdf8;
      --radius-xl: 26px;
      --radius-lg: 18px;
      --radius-md: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Lora', Georgia, serif;
      color: var(--text-dark);
      background: var(--ivory);
      background-image:
        radial-gradient(circle at 10% 0%, rgba(232, 98, 26, 0.08), transparent 28%),
        radial-gradient(circle at 90% 8%, rgba(201, 150, 42, 0.1), transparent 30%);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      padding: 14px 24px;
      background: rgba(26, 10, 0, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(201, 150, 42, 0.3);
    }

    .brand {
      color: var(--gold-light);
      text-decoration: none;
      font-family: 'Yatra One', serif;
      letter-spacing: 1px;
      font-size: 1.3rem;
    }

    .back-link {
      color: var(--cream);
      text-decoration: none;
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      transition: color 220ms ease;
    }

    .back-link:hover {
      color: var(--gold-light);
    }

    .shell {
      width: min(1160px, calc(100% - 34px));
      margin: 26px auto 78px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 34px;
      border: 1px solid rgba(201, 150, 42, 0.28);
      border-radius: var(--radius-xl);
      background:
        radial-gradient(circle at 18% 20%, rgba(232, 98, 26, 0.28), transparent 30%),
        radial-gradient(circle at 82% 14%, rgba(201, 150, 42, 0.2), transparent 28%),
        linear-gradient(138deg, rgba(61, 0, 7, 0.97), rgba(26, 10, 0, 0.94));
      box-shadow: 0 22px 52px rgba(44, 24, 16, 0.22);
    }

    .hero::after {
      content: '';
      position: absolute;
      inset: 12px;
      border-radius: calc(var(--radius-xl) - 8px);
      border: 1px solid rgba(245, 230, 200, 0.16);
      pointer-events: none;
    }

    .hero-grid {
      position: relative;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 22px;
      z-index: 1;
    }

    .hero-main {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .hero-side {
      border-radius: var(--radius-lg);
      border: 1px solid rgba(245, 230, 200, 0.2);
      background: rgba(26, 10, 0, 0.34);
      padding: 18px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 14px;
    }

    .state-seal {
      display: grid;
      place-items: center;
      width: 106px;
      aspect-ratio: 1;
      border-radius: 50%;
      border: 1px solid rgba(240, 192, 64, 0.42);
      color: var(--gold-light);
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-left: auto;
      background: rgba(61, 0, 7, 0.32);
    }

    .state-note {
      margin: 0;
      color: rgba(245, 230, 200, 0.84);
      line-height: 1.75;
      font-size: 0.92rem;
    }

    .eyebrow {
      font-family: 'Cinzel', serif;
      text-transform: uppercase;
      letter-spacing: 5px;
      color: var(--gold-light);
      font-size: 0.72rem;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-family: 'Yatra One', serif;
      font-size: clamp(2.6rem, 6vw, 5.2rem);
      line-height: 0.95;
      color: var(--ivory);
    }

    .subline {
      margin-top: 13px;
      color: rgba(245, 230, 200, 0.86);
      max-width: 760px;
      line-height: 1.85;
      font-size: 1.01rem;
    }

    .meta-row {
      margin-top: 28px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .meta-pill {
      padding: 10px 14px;
      border: 1px solid rgba(245, 230, 200, 0.26);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      font-size: 0.84rem;
      color: var(--cream);
      backdrop-filter: blur(4px);
    }

    .layout {
      display: grid;
      grid-template-columns: 1.38fr 0.92fr;
      gap: 22px;
      margin-top: 24px;
    }

    .panel,
    .section-block {
      border-radius: var(--radius-lg);
      border: 1px solid rgba(201, 150, 42, 0.26);
      background: linear-gradient(180deg, var(--white), #f8efdc);
      box-shadow: 0 14px 28px rgba(44, 24, 16, 0.08);
    }

    .panel-card {
      padding: 24px;
    }

    .section-block {
      margin-top: 24px;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .section-block::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(201, 150, 42, 0.95), transparent);
    }

    .section-title {
      margin: 0 0 10px;
      font-family: 'Yatra One', serif;
      font-size: clamp(1.4rem, 2.8vw, 2rem);
      line-height: 1.08;
      color: var(--maroon);
    }

    .section-subtitle {
      margin: 0 0 16px;
      color: var(--text-light);
      font-style: italic;
      font-size: 0.9rem;
      line-height: 1.7;
    }

    .overview {
      line-height: 1.9;
      color: var(--text-mid);
      margin: 0;
      font-size: 0.98rem;
    }

    .facts-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .fact {
      padding: 15px;
      border-radius: var(--radius-md);
      background: linear-gradient(180deg, #fffdf9, #fdf4e4);
      border: 1px solid rgba(201, 150, 42, 0.22);
      transition: transform 200ms ease, box-shadow 200ms ease;
    }

    .fact:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(107, 15, 26, 0.08);
    }

    .fact-label {
      display: block;
      color: var(--saffron);
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    .fact-value {
      color: var(--text-dark);
      line-height: 1.45;
      font-size: 0.94rem;
    }

    .grid-2,
    .grid-3 {
      display: grid;
      gap: 18px;
    }

    .grid-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .grid-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .list-card {
      padding: 22px;
      border-radius: var(--radius-md);
      background: linear-gradient(180deg, #fffdf8, #f9f1dd);
      border: 1px solid rgba(201, 150, 42, 0.2);
      transition: transform 200ms ease, box-shadow 200ms ease;
    }

    .list-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(107, 15, 26, 0.08);
    }

    .list-card h3 {
      margin: 0 0 12px;
      font-family: 'Yatra One', serif;
      color: var(--maroon);
      font-size: 1.16rem;
    }

    .list-card ul {
      margin: 0;
      padding-left: 18px;
      color: var(--text-mid);
      line-height: 1.86;
    }

    .list-card li::marker {
      color: var(--saffron);
    }

    .visit-item {
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(201, 150, 42, 0.2);
    }

    .visit-item:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }

    .visit-name {
      display: block;
      font-family: 'Yatra One', serif;
      color: var(--maroon);
      font-size: 1.04rem;
      margin-bottom: 5px;
    }

    .visit-desc,
    .festival-note {
      margin: 0;
      color: var(--text-mid);
      line-height: 1.72;
      font-size: 0.93rem;
    }

    .festival-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 14px 0;
      border-bottom: 1px solid rgba(201, 150, 42, 0.2);
    }

    .festival-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .festival-month {
      min-width: 96px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #fff0e0;
      color: var(--maroon);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: center;
      font-family: 'Cinzel', serif;
      margin-top: 1px;
      border: 1px solid rgba(232, 98, 26, 0.2);
    }

    .festival-name {
      font-family: 'Yatra One', serif;
      color: var(--text-dark);
      margin: 0 0 4px;
      font-size: 1.04rem;
    }

    .empty-state,
    .loading-state,
    .error-state {
      padding: 50px 24px;
      text-align: center;
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, #fffdf8, #f9f1dd);
      border: 1px solid rgba(201, 150, 42, 0.24);
      color: var(--text-mid);
      box-shadow: 0 14px 28px rgba(44, 24, 16, 0.08);
    }

    .error-state strong {
      color: var(--maroon);
    }

    .reveal {
      animation: rise 650ms ease-out both;
    }

    .delay-1 {
      animation-delay: 70ms;
    }

    .delay-2 {
      animation-delay: 130ms;
    }

    .delay-3 {
      animation-delay: 190ms;
    }

    .delay-4 {
      animation-delay: 250ms;
    }

    .delay-5 {
      animation-delay: 310ms;
    }

    .delay-6 {
      animation-delay: 370ms;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 900px) {

      .hero-grid,
      .layout,
      .grid-2,
      .grid-3 {
        grid-template-columns: 1fr;
      }

      .hero {
        padding: 28px;
      }

      .hero-side {
        order: -1;
      }

      .state-seal {
        margin-left: 0;
      }

      .facts-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .shell {
        width: min(100% - 20px, 1160px);
      }

      .hero {
        padding: 28px 20px;
        border-radius: 22px;
      }

      .panel-card,
      .section-block {
        padding: 18px;
      }

      .topbar {
        padding: 14px 16px;
      }

      .meta-row {
        gap: 8px;
        grid-template-columns: 1fr;
      }

      .meta-pill {
        width: 100%;
        border-radius: 12px;
      }

      .festival-row {
        flex-direction: column;
      }

      .festival-month {
        min-width: 0;
      }
    }
  </style>
</head>

<body>
  <div class="topbar">
    <a class="brand" href="/">भारत Bharat</a>
    <a class="back-link" href="/#states">Back to home</a>
  </div>

  <main class="shell">
    <div id="pageState">
      <div class="loading-state">Loading state details...</div>
    </div>
  </main>

  <script>
    function getStateSlugFromPath() {
      const parts = window.location.pathname.split('/').filter(Boolean);
      return decodeURIComponent(parts[1] || '');
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function renderList(items) {
      return `<ul>${items.map((item) => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`;
    }

    function renderStatePage(state) {
      const root = document.getElementById('pageState');
      const keywords = [state.name, state.capital, state.region, ...(state.languages || [])].join(' • ');

      root.innerHTML = `
        <section class="hero reveal">
          <div class="hero-grid">
            <div class="hero-main">
              <div class="eyebrow">State Explorer</div>
              <h1>${escapeHtml(state.name)}</h1>
              <p class="subline">${escapeHtml(state.overview)}</p>
              <div class="meta-row">
                <div class="meta-pill">Capital: ${escapeHtml(state.capital)}</div>
                <div class="meta-pill">Region: ${escapeHtml(state.region)}</div>
                <div class="meta-pill">Best time: ${escapeHtml(state.bestTimeToVisit || 'Not listed')}</div>
                <div class="meta-pill">Trip length: ${escapeHtml(state.idealTripDuration || 'Not listed')}</div>
              </div>
            </div>
            <aside class="hero-side">
              <div class="state-seal">Bharat<br>Atlas</div>
              <p class="state-note">A detailed profile of geography, history, culture, festivals, and travel highlights curated for better trip planning.</p>
            </aside>
          </div>
        </section>

        <div class="layout reveal delay-1">
          <section class="panel panel-card">
            <h2 class="section-title">Overview</h2>
            <p class="section-subtitle">The essence of ${escapeHtml(state.name)} at a glance.</p>
            <p class="overview">${escapeHtml(state.overview)}</p>
          </section>
          <aside class="panel panel-card">
            <h2 class="section-title">Quick Facts</h2>
            <div class="facts-grid">
              <div class="fact"><span class="fact-label">Capital</span><span class="fact-value">${escapeHtml(state.capital)}</span></div>
              <div class="fact"><span class="fact-label">Region</span><span class="fact-value">${escapeHtml(state.region)}</span></div>
              <div class="fact"><span class="fact-label">Languages</span><span class="fact-value">${escapeHtml((state.languages || []).join(', ') || 'N/A')}</span></div>
              <div class="fact"><span class="fact-label">Best Time</span><span class="fact-value">${escapeHtml(state.bestTimeToVisit || 'N/A')}</span></div>
            </div>
          </aside>
        </div>

        <section class="section-block reveal delay-2">
          <h2 class="section-title">Geography & History</h2>
          <p class="section-subtitle">Landscape, legacy, and how this state evolved through time.</p>
          <div class="grid-2">
            <div class="list-card">
              <h3>Geography</h3>
              <p class="overview">${escapeHtml(state.geography || 'Not available yet.')}</p>
            </div>
            <div class="list-card">
              <h3>History</h3>
              <p class="overview">${escapeHtml(state.history || 'Not available yet.')}</p>
            </div>
          </div>
        </section>

        <section class="section-block reveal delay-3">
          <h2 class="section-title">Culture, Food & Economy</h2>
          <p class="section-subtitle">Traditions, flavors, and key economic strengths.</p>
          <div class="grid-3">
            <div class="list-card">
              <h3>Culture</h3>
              ${renderList(state.cultureHighlights || [])}
            </div>
            <div class="list-card">
              <h3>Cuisine</h3>
              ${renderList(state.cuisineHighlights || [])}
            </div>
            <div class="list-card">
              <h3>Economy</h3>
              ${renderList(state.economyHighlights || [])}
            </div>
          </div>
        </section>

        <section class="section-block reveal delay-4">
          <h2 class="section-title">Must Visit Places</h2>
          <p class="section-subtitle">Iconic destinations you should include in your itinerary.</p>
          <div class="list-card">
            ${(state.mustVisit || []).map((place) => `
              <div class="visit-item">
                <span class="visit-name">${escapeHtml(place.name)}</span>
                <p class="visit-desc">${escapeHtml(place.description)}</p>
              </div>
            `).join('')}
          </div>
        </section>

        <section class="section-block reveal delay-5">
          <h2 class="section-title">Major Festivals</h2>
          <p class="section-subtitle">Celebrations that define the rhythm of local life.</p>
          <div class="list-card">
            ${(state.majorFestivals || []).map((festival) => `
              <div class="festival-row">
                <div class="festival-month">${escapeHtml(festival.month || 'Any time')}</div>
                <div>
                  <h3 class="festival-name">${escapeHtml(festival.name)}</h3>
                  <p class="festival-note">${escapeHtml(festival.note)}</p>
                </div>
              </div>
            `).join('')}
          </div>
        </section>

        <section class="section-block reveal delay-6">
          <h2 class="section-title">Travel Guide</h2>
          <p class="section-subtitle">Practical tips and reasons travelers keep coming back.</p>
          <div class="grid-2">
            <div class="list-card">
              <h3>Travel Tips</h3>
              ${renderList(state.travelTips || [])}
            </div>
            <div class="list-card">
              <h3>Why ${escapeHtml(state.name)}?</h3>
              <p class="overview">${escapeHtml((state.famousFor || []).join(', '))}</p>
            </div>
          </div>
        </section>
      `;

      document.title = `${state.name} | Bharat`;
      const description = document.querySelector('meta[name="description"]') || document.createElement('meta');
      description.name = 'description';
      description.content = `${state.name} state guide: ${keywords}.`;
      if (!description.isConnected) document.head.appendChild(description);
    }

    async function loadState() {
      const slug = getStateSlugFromPath();
      const root = document.getElementById('pageState');

      if (!slug) {
        root.innerHTML = '<div class="error-state"><strong>Missing state name.</strong> Open the page as /state/bihar or /state/andhra-pradesh.</div>';
        return;
      }

      try {
        const response = await fetch(`/api/state/${encodeURIComponent(slug)}`);
        const data = await response.json();

        if (!response.ok) {
          root.innerHTML = `<div class="error-state"><strong>State not found.</strong><br>${escapeHtml(data.error || 'No data available for this state.')}</div>`;
          return;
        }

        renderStatePage(data);
      } catch (error) {
        root.innerHTML = `<div class="error-state"><strong>Could not load state data.</strong><br>${escapeHtml(error.message)}</div>`;
      }
    }

    loadState();
  </script>
</body>

</html>
